name: Pipeline Sincronizare Monitoare PDF
on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  sincronizare_pdf:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        an: ["2000", "2001", "2002", "2003", "2004", "2005", "2006", "2007", "2008", "2009", "2010", "2011", "2012", "2013", "2014", "2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022", "2023", "2024", "2025", "2026"]
      max-parallel: 1
      fail-fast: false

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalare librării necesare
        run: |
          pip install google-auth google-auth-httplib2 google-api-python-client httpx

      - name: Executare Sincronizare Totala
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          AN_CURENT: ${{ matrix.an }}
        run: |
          python -u scripts_pdf/download_PDF.py
