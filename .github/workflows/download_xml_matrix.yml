name: Download XML Just.ro (Matrix)

on:
  workflow_dispatch:
    inputs:
      ani_input:
        description: 'Ani sau intervale (ex: 1990, 1992-1995, 2000, 2005-2010)'
        required: true
        default: '1990-1995'
      max_paralel:
        description: 'Numărul maxim de ani procesați simultan în paralel'
        required: true
        default: '5'

jobs:
  # 1. Job preliminar: Parsează input-ul și generează lista exactă de ani
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix_ani: ${{ steps.set-matrix.outputs.matrix_ani }}
    steps:
      - name: Calculare matrice ani
        id: set-matrix
        run: |
          python3 -c '
          import os, json, re

          input_str = "${{ github.event.inputs.ani_input }}"
          ani_set = set()

          # Parsează bucăți separate prin virgulă sau spațiu
          parti = re.split(r"[,\s]+", input_str.strip())
          for parte in parti:
              if not parte:
                  continue
              if "-" in parte:
                  m = re.match(r"^(\d{4})-(\d{4})$", parte)
                  if m:
                      start, end = int(m.group(1)), int(m.group(2))
                      if start <= end:
                          ani_set.update(range(start, end + 1))
              elif parte.isdigit():
                  ani_set.add(int(parte))

          ani_sortati = sorted(list(ani_set))
          print(f"Ani rezultați pentru procesare: {ani_sortati}")
          
          # Salvează matricea JSON ca output
          output_json = json.dumps(ani_sortati)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix_ani={output_json}\n")
          '

  # 2. Jobul principal: Rulează câte un fir independent per an
  proceseaza-an:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Dacă un an eșuează, celelalte fire continuă nestingherite
      max-parallel: ${{ integers(github.event.inputs.max_paralel) }}
      matrix:
        an: ${{ json(needs.matrix_ani.outputs.matrix_ani) }}

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalare dependențe Python
        run: |
          pip install google-api-python-client google-auth requests suds-py3

      - name: Descărcare și Arhivare XML pentru Anul ${{ matrix.an }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML }}
          XML_STORAGE_INDEX: ${{ secrets.XML_STORAGE_INDEX }}
          JUST_RO_WSDL_URL: ${{ secrets.JUST_RO_WSDL_URL }}
        run: |
          python Scripts_XML/download_xml.py ${{ matrix.an }}

  # 3. Job final de unificare în MasterIndex (rulat automat după ce toți anii s-au terminat)
  unificare-master-index:
    needs: proceseaza-an
    if: always()  # Se execută chiar dacă unele fire au avut atenționări
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalare dependențe
        run: |
          pip install google-api-python-client google-auth

      - name: Unificare Micro-Indecși în MasterIndex.json.gz
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          XML_STORAGE_INDEX: ${{ secrets.XML_STORAGE_INDEX }}
        run: |
          python Scripts_XML/rebuild_master_index.py
