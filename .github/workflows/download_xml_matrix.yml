name: Download XML Just.ro (Matrix)

on:
  workflow_dispatch:
    inputs:
      ani_input:
        description: 'Ani sau intervale (ex: 1990, 1992-1995, 2000, 2005-2010)'
        required: true
        default: '1990-1995'
      max_paralel:
        description: 'Numarul maxim de ani procesati simultan in paralel'
        required: true
        default: '5'

jobs:
  # 1. Job preliminar: Parsează input-ul și generează lista exactă de ani
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix_ani: ${{ steps.set-matrix.outputs.matrix_ani }}
    steps:
      - name: Calculare matrice ani
        id: set-matrix
        env:
          INPUT_ANI: ${{ github.event.inputs.ani_input }}
        run: |
          python3 -c '
          import os, json, re

          input_str = os.environ.get("INPUT_ANI", "")
          ani_set = set()

          parti = re.split(r"[,\s]+", input_str.strip())
          for parte in parti:
              if not parte:
                  continue
              if "-" in parte:
                  m = re.match(r"^(\d{4})-(\d{4})$", parte)
                  if m:
                      start, end = int(m.group(1)), int(m.group(2))
                      if start <= end:
                          ani_set.update(range(start, end + 1))
              elif parte.isdigit():
                  ani_set.add(int(parte))

          ani_sortati = sorted(list(ani_set))
          print(f"Ani rezultati pentru procesare: {ani_sortati}")
          
          output_json = json.dumps(ani_sortati)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix_ani={output_json}\n")
          '

  # 2. Jobul principal: Rulează câte un fir independent per an
  proceseaza-an:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_paralel) }}
      matrix:
        an: ${{ fromJSON(needs.generate-matrix.outputs.matrix_ani) }}

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependente Python
        run: |
          pip install google-api-python-client google-auth requests suds-py3

      - name: Descarcare si Arhivare XML pentru Anul ${{ matrix.an }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML || secrets.DRIVE_FOLDER_XML }}
          XML_STORAGE_INDEX: ${{ vars.XML_STORAGE_INDEX || secrets.XML_STORAGE_INDEX }}
          FOLDER_INDEX_ID: ${{ vars.XML_STORAGE_INDEX || secrets.XML_STORAGE_INDEX }}
          TEMPORARY_XML_INDEXES: ${{ vars.TEMPORARY_XML_INDEXES || secrets.TEMPORARY_XML_INDEXES }}
          JUST_RO_WSDL_URL: ${{ vars.JUST_RO_WSDL_URL || secrets.JUST_RO_WSDL_URL }}
        run: |
          SCRIPT_PATH=$(find . -type f -iname "download_xml.py" | head -n 1)
          echo "Executare script gasit la cale: $SCRIPT_PATH"
          python "$SCRIPT_PATH" ${{ matrix.an }}
