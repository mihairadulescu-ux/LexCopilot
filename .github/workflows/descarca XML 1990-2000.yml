name: "Descărcare Legislație Paralelă XML 1990-1999"

on:
  workflow_dispatch: # Pornire manuală din GitHub Actions
  schedule:
    - cron: '0 1 * * *' # Rulează automat în fiecare noapte la ora 01:00 AM UTC

jobs:
  download:
    name: "Segment: ${{ matrix.nume }}"
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false # Dacă un segment dă eroare, celelalte continuă să ruleze!
      matrix:
        include:
          - nume: "1990-1991"
            start: 1990
            end: 1991
          - nume: "1992 - 1993"
            start: 1992
            end: 1993
          - nume: "1994 - 1995"
            start: 1994
            end: 1995
          - nume: "1996 - 1997"
            start: 1996
            end: 1997
          - nume: "1998 - 1999"
            start: 1998
            end: 1999

    steps:
      - name: Checkout cod din repository
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependente
        run: |
          python -m pip install --upgrade pip
          pip install lxml zeep google-api-python-client google-auth requests

      - name: Rulează Descărcarea
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          START_YEAR: ${{ matrix.start }}
          END_YEAR: ${{ matrix.end }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u main_all.py
