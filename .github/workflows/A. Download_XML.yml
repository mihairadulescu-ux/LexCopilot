name: Download XML Just.ro (Matrix)

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Anul de start'
        required: false
        default: '2000'
      end_year:
        description: 'Anul de final'
        required: false
        default: '2026'
  schedule:
    - cron: '0 0 * * *'

jobs:
  download-xml-matrix:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include:
          - start_year: 1990
            end_year: 1995
          - start_year: 1996
            end_year: 2000
          - start_year: 2001
            end_year: 2005
          - start_year: 2006
            end_year: 2010
          - start_year: 2011
            end_year: 2015
          - start_year: 2020
            end_year: 2026
            
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib zeep lxml

      - name: Run Download XML Script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          XML_STORAGE_INDEX: ${{ vars.XML_STORAGE_INDEX }}
          TEMPORARY_XML_INDEXES: ${{ vars.TEMPORARY_XML_INDEXES }}
          METADATA_FOLDER_ID: ${{ vars.METADATA_FOLDER_ID }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}
          START_YEAR: ${{ matrix.start_year }}
          END_YEAR: ${{ matrix.end_year }}
        run: |
          python Scripts_XML/download_XML.py ${{ matrix.start_year }} ${{ matrix.end_year }}
