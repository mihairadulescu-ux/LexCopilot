name: 1. Executie Descarcare Industriala XML

on:
  workflow_dispatch:

jobs:
  descarcare_xml:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ani: ["1970 1974", "1975 1979", "1980 1989", "1990 1994", "195 1999", "2012 2013"]

    steps:
      - name: Verificare Cod Sursa (Checkout)
        uses: actions/checkout@v4

      - name: Configurare Mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: ""

      - name: Instalare Dependinte Necesare
        run: |
          python -m pip install --upgrade pip
          pip install lxml zeep google-auth google-api-python-client

      - name: Rulare Descarcare XML cu Fallback Dinamic
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}
        run: python Scripts_XML/download_XML.py ${{ matrix.ani }}
