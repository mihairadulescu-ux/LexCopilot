name: "One-Off: Mutare PDF-uri in Shared Drive Nou"

on:
  workflow_dispatch: # Ne permite să-l pornim manual printr-un buton

jobs:
  move_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalare dependente
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Executare script mutare
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
        run: python muta_fisiere.py
