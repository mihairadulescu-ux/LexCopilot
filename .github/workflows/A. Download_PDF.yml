name: REGELE PDF - Sincronizare Matriceala in Paralel

on:
  workflow_dispatch:
    inputs:
      ruleaza_reset:
        description: "Curatare totala si reconstructie registru CSV (True/False)"
        required: false
        type: boolean
        default: false

jobs:
  procesare_an:
    name: Sincronizare An ${{ matrix.an }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        an: [2000, 2001, 2002, 2003, 2004, 2005, 2006]

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth httpx

      - name: PASUL UNIC - Executare Refacere Index si Download Ierarhic
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          AN_TINTA: ${{ matrix.an }}
          STRATEGIE_RESET: ${{ github.event.inputs.ruleaza_reset }}
          PYTHONUNBUFFERED: "1"
        run: |
          # Verificăm variabila mapată în mediu securizat pentru a evita crash-ul de sintaxă YAML
          if [ "$STRATEGIE_RESET" = "true" ]; then
            printenv
            python -u Scripts_PDF/inventar_si_reset.py $AN_TINTA
          fi
          
          # Executare crawler cu noua barieră ierarhică iute
          python -u Scripts_PDF/download_PDF.py $AN_TINTA
