name: REGELE PDF - Sincronizare Unificata

on:
  workflow_dispatch:
    inputs:
      ruleaza_reset:
        description: "Curatare totala dummy-uri si reconstructie registre CSV"
        required: false
        type: boolean
        default: false

jobs:
  sync_pdfs:
    name: Procesare Matriceala PDF
    runs-on: ubuntu-latest
    
    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth httpx

      - name: PASUL A - Reset si Indexare Istorica
        if: ${{ github.event.inputs.ruleaza_reset == 'true' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u Scripts_PDF/reset_and_index.py

      - name: PASUL B - Executare Crawler bazat pe CSV
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          START_YEAR: "2000"
          END_YEAR: "2026"
          PYTHONUNBUFFERED: "1"
        run: |
          python -u Scripts_PDF/download_pdfs.py
