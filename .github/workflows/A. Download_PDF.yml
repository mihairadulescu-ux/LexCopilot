name: REGELE PDF - Sincronizare Matriceala in Paralel

on:
  workflow_dispatch:
    inputs:
      ruleaza_reset:
        description: "Curatare totala si reconstructie registru CSV (True/False)"
        required: false
        type: boolean
        default: false

jobs:
  procesare_an:
    name: Sincronizare An ${{ matrix.an }}
    runs-on: ubuntu-latest
    strategy:
      # max-parallel previne blocarea serverului Monitorului Oficial (rulează maximum 3 ani în paralel simultan)
      max-parallel: 3
      fail-fast: false
      matrix:
        an: [2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth httpx

      - name: PASUL UNIC - Executare Refacere Index si Download Ierarhic
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          AN_TINTA: ${{ matrix.an }}
          RULEAZA_RESET: ${{ github.event.inputs.ruleaza_reset }}
          PYTHONUNBUFFERED: "1"
        run: |
          # 1. Dacă bifa de reset e activă, reface integral CSV-ul doar pentru anul curent din matrice
          if [ "${{ github.event.inputs.ruleaza_reset }}" = "true" ]; then
            python -u Scripts_PDF/inventar_si_reset.py $AN_TINTA
          fi
          
          # 2. Pornește descărcarea ierarhică strict pe anul curent din matrice
          python -u Scripts_PDF/download_PDF.py $AN_TINTA
