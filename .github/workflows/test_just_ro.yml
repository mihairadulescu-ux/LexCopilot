name: Test Interogare Just.ro

on:
  workflow_dispatch:

jobs:
  test-just-ro:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod din repozitoriu
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Executare Test Just.ro
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -u temp/test_just_ro.py
