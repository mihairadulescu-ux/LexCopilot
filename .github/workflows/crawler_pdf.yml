name: Monitorul Oficial PDF Crawler

on:
  schedule:
    # Rulează automat în fiecare noapte la ora 23:00 UTC (adică ora 02:00 dimineața în România)
    - cron: '0 23 * * *'
  workflow_dispatch: # Îți adaugă butonul de "Run workflow" în interfață ca să-l pornești manual când vrei

jobs:
  download-pdf:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Aici pui pur și simplu lista de ani pe care vrei să-i rulezi în paralel.
        # De exemplu, acum va lansa 4 instanțe simultane. Modifică lista cum ai nevoie!
        an: [2021, 2022, 2023, 2024]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Rulare Descarcare PDF
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PYTHONUNBUFFERED: "1"
        # Scriptul primește acum același an și ca început și ca sfârșit, rulând exact anul din instanța curentă
        run: |
          python crawler_pdf.py ${{ matrix.an }} ${{ matrix.an }}
