name: Monitorul Oficial PDF Crawler

on:
  schedule:
    # Rulează automat în fiecare noapte la ora 23:00 UTC (adică ora 02:00 dimineața în România)
    - cron: '0 23 * * *'
  workflow_dispatch: # Îți adaugă butonul de "Run workflow" în interfață ca să-l pornești manual când vrei

jobs:
  download-pdf:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Aici setezi ce ani vrei să ruleze în paralel. Acum este pus pe 2023 și 2024.
        include:
          - start_year: 2023
            end_year: 2023
          - start_year: 2024
            end_year: 2024

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Rulare Descarcare PDF
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PYTHONUNBUFFERED: "1"
        run: |
          python crawler_pdf.py ${{ matrix.start_year }} ${{ matrix.end_year }}
