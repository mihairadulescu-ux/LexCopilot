name: Scanare Metadate (CodiceCurat)

on:
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-api-python-client

    - name: Run Scanare Script
      env:
        # Aici am mapat secretul tău exact așa cum se numește în GitHub Settings
        GDRIVE_CREDENTIALS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }} 
      run: |
        python codice_curat/src/scanare_brut.py
