name: Procesare Acte Normative

on:
  workflow_dispatch: # Îl poți porni manual când dorești

jobs:
  procesare:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout cod
      uses: actions/checkout@v4

    - name: Configurare Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # Pasul 1: Sincronizează datele din Google Drive local pe runner-ul GitHub
    # Folosește un utilitar precum rclone sau gdrive-cli cu credențialele tale salvate în GitHub Secrets
    - name: Descarcă datele din Google Drive
      run: |
        echo "Aici rulează comanda care descarcă fișierele din Drive într-un folder local './date_brute'"
        # Exemplu ipotetic: rclone sync gdrive:acte ./date_brute

    # Pasul 2: Rulează scriptul de procesare în paralel direct pe fișierele locale
    - name: Rulează Extractorul de Metadate (Paralel)
      run: python script_procesare.py
