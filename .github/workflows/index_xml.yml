name: Indexare XML Master

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        type: boolean
        default: false
        description: 'Bifează pentru FULL RE-INDEX complet (Stergere duplicate + Curățenie micro-indecși + Trash)'

  schedule:
    - cron: '0 2 * * *'  # Rulează automat zilnic la ora 02:00 UTC (Incremental)

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Cod
        uses: actions/checkout@v4

      - name: Configurare Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalare Dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Execuție Index Builder
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
        run: |
          VAL_LOWER=$(echo "${{ inputs.full_rebuild }}" | tr '[:upper:]' '[:lower:]')
          if [ "$VAL_LOWER" = "true" ]; then
            echo "🚀 [Strategie YML] Se execută FULL RE-INDEX COMPLET (build_index.py)..."
            python Scripts_XML/build_index.py FULL
          else
            echo "⚡ [Strategie YML] Se execută RE-INDEX INCREMENTAL (build_index.py)..."
            python Scripts_XML/build_index.py INCREMENTAL
          fi
