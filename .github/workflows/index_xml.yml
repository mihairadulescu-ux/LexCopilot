name: Re-Indexare & Consolidare Master Index XML

on:
  schedule:
    # Rulează automat în fiecare duminică noaptea la ora 02:00
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force_reindex:
        description: 'Forțează reconstrucția completă a indexului master'
        required: false
        type: boolean
        default: true

jobs:
  build-master-index:
    name: Build Master Index (.json.gz)
    runs-on: ubuntu-latest

    # ==========================================================================
    # VARIABILE GLOBALE DE MEDIU (Obligatorii pentru build_index.py)
    # ==========================================================================
    env:
      TEMPORARY_XML_INDEXES: ${{ secrets.TEMPORARY_XML_INDEXES || vars.TEMPORARY_XML_INDEXES }}
      XML_STORAGE_INDEX: ${{ secrets.XML_STORAGE_INDEX || vars.XML_STORAGE_INDEX }}
      DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
      METADATA_FOLDER_ID: ${{ secrets.METADATA_FOLDER_ID || vars.METADATA_FOLDER_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout cod din repozitoriu
        uses: actions/checkout@v4

      - name: Configurare mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalare dependențe Python
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Execuție Script Build Index
        run: |
          echo "🚀 Pornire consolidare Master Index XML..."
          python Scripts_XML/build_index.py
