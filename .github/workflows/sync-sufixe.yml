name: "Descarcare minitoare secundare"
on:
  workflow_dispatch:
  schedule:
    - cron: "30 */6 * * *" # Rulează la 30 de minute după cel simplu, tot din 6 în 6 ore

jobs:
  sync_sufixe_slices:
    name: "Sufixe Slices: ${{ matrix.ani_slice }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Păstrăm aceeași segmentare perfectă pe ani
        ani_slice: [
          "2000,2001,2002,2003,2004",
          "2005,2006,2007,2008,2009",
          "2010,2011,2012,2013,2014",
          "2015,2016,2017,2018,2019",
          "2020,2021,2022,2023",
          "2024,2025,2026"
        ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalare dependente
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib httpx

      - name: Rulare sync_sufixe
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          YEARS: ${{ matrix.ani_slice }}
        run: python sync_sufixe.py
