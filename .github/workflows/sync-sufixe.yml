name: "2. Descărcare PDF-uri Sufixe (Matrice)"

on:
  workflow_dispatch: # Pornire manuală la buton

jobs:
  download_sufixe:
    name: "Descarcă Sufixe - Anul ${{ matrix.an }}"
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        an: [
          "2000", "2001", "2002", "2003", "2004", 
          "2005", "2006", "2007", "2008", "2009", 
          "2010", "2011", "2012", "2013", "2014", 
          "2015", "2016", "2017", "2018", "2019", 
          "2020", "2021", "2022", "2023", "2024", 
          "2025", "2026"
        ]

    steps:
      - name: Checkout cod din repository
        uses: actions/checkout@v4

      - name: Configurare Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependente
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Rulare Descărcare Sufixe
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ secrets.DRIVE_FOLDER_PDF }}
          AN_PROCESAT: ${{ matrix.an }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u sync_sufixe.py
