name: Utilitar Matriceal - Arhivare Anuală TAR.GZ
run-name: 📦 Arhivare XML (${{ github.event.inputs.matrice_ani }})

on:
  workflow_dispatch:
    inputs:
      matrice_ani:
        description: 'Ani sau intervale (ex: 1990-1995, 2000, 2010-2015)'
        required: true
        default: '1990-1999, 2000-2009, 2010-2015, 2016-2020, 2021-2026'

jobs:
  generate-matrix:
    name: Generare Matrice Ani Individuali
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Expandare Interval în Ani Unici
        id: set-matrix
        run: |
          INPUT_VAL="1990-2026}"
          
          # Script Bash care extinde intervalele (ex: 1990-1992 -> 1990, 1991, 1992)
          python3 -c "
          import json, sys

          raw_input = '''$INPUT_VAL'''
          ani_unici = []

          for bucata in raw_input.split(','):
              bucata = bucata.strip()
              if '-' in bucata:
                  parts = bucata.split('-')
                  start, end = int(parts[0]), int(parts[1])
                  if start > end:
                      start, end = end, start
                  ani_unici.extend(list(range(start, end + 1)))
              elif bucata.isdigit():
                  ani_unici.append(int(bucata))

          # Eliminăm duplicatele și sortăm crescător
          ani_finali = sorted(list(set(ani_unici)))
          print('matrix=' + json.dumps({'an': [str(a) for a in ani_finali]}))
          " >> $GITHUB_OUTPUT

  arhiva-xml:
    name: Arhivare Anul ${{ matrix.an }}
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20  # Poți ajusta numărul de joburi paralele (ex: 2 sau 3)
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}

    env:
      DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Execuție Arhivare Anuală
        run: |
          python Scripts_XML/arhiva_anuala_xml.py ${{ matrix.an }}
