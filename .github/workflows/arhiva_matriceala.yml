name: Utilitar Matriceal - Curățare pe Discuri Shared Drive
run-name: ✏️ Igienizare XML pe Discul ${{ matrix.drive_idx }}

on:
  workflow_dispatch:

jobs:
  redenumire-discuri:
    name: Curățare Shared Drive #${{ matrix.drive_idx }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 7  # Toate cele 7 discuri lucrează simultan!
      matrix:
        drive_idx: [1, 2, 3, 4, 5, 6, 7]

    env:
      DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Execuție Curățare pe Discul ${{ matrix.drive_idx }}
        run: |
          python Scripts_XML/redenumeste_fisiere_drive.py ${{ matrix.drive_idx }}
