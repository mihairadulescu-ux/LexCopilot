name: 🔄 CRON - Indexare XML (Incremental / Daily Full)

on:
  schedule:
    # Rulează din 2 în 2 ore
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      pune_reset:
        description: "Forțează reindexarea totală de la zero (True/False)"
        required: false
        type: boolean
        default: false

jobs:
  indexare_globala:
    name: 🔍 Actualizare Index XML în Drive
    runs-on: ubuntu-latest

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Determinare Strategie (Daily Full la ora 07:00 vs Incremental)
        id: check_reset
        run: |
          # Obținem ora curentă în UTC
          ORA_CURENTA=$(date -u +'%H')
          PUNE_RESET_INPUT="${{ github.event.inputs.pune_reset }}"
          
          # Dacă e ora 07:00 UTC SAU s-a declanșat manual cu reset=true
          if [ "$ORA_CURENTA" -eq "07" ] || [ "$PUNE_RESET_INPUT" == "true" ]; then
            echo "FORTEAZA_RESET=true" >> $GITHUB_ENV
            echo "🚀 [Strategie] Se execută FULL INDEX (Reindexare completă)."
          else
            echo "FORTEAZA_RESET=false" >> $GITHUB_ENV
            echo "⚡ [Strategie] Se execută INCREMENTAL INDEX (Delta)."
          fi

      - name: Executare Script Indexare
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}
          XML_STORAGE_INDEX: ${{ vars.XML_STORAGE_INDEX }}
          TEMPORARY_XML_INDEXES: ${{ vars.TEMPORARY_XML_INDEXES }}
          STRATEGIE_RESET: ${{ env.FORTEAZA_RESET }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u Scripts_XML/build_index.py
