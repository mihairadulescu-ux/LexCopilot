name: Doar Indexare XML (Build Index Only)

on:
  workflow_dispatch:
    inputs:
      full_index:
        type: boolean
        description: 'Forțează Reindexare Completă (FULL INDEX)'
        default: true

jobs:
  build-index-only:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod din repozitoriu
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 google-api-python-client google-auth

      - name: Executare Construire / Actualizare Index (FĂRĂ DESCĂRCARE)
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          IS_FULL: ${{ github.event.inputs.full_index }}
        run: |
          VAL_LOWER=$(echo "${IS_FULL}" | tr '[:upper:]' '[:lower:]')
          if [ "${VAL_LOWER}" = "true" ]; then
            echo "🚀 [Strategie YML] Se execută EXCLUSIV FULL INDEX (parametrul --full)..."
            python -u Scripts_XML/build_index.py --full
          else
            echo "⚡ [Strategie YML] Se execută EXCLUSIV INCREMENTAL INDEX..."
            python -u Scripts_XML/build_index.py
          fi
