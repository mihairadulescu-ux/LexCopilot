name: Descarcă și Indexează XML-uri

on:
  workflow_dispatch:
    inputs:
      an_start:
        description: 'Anul de început (ex: 1950)'
        required: false
        default: '1950'
      an_end:
        description: 'Anul de sfârșit (ex: 2026)'
        required: false
        default: '2026'
      full_index:
        type: boolean
        description: 'Forțează Reindexare Completă (FULL INDEX)'
        default: false

jobs:
  download-and-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod din repozitoriu
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 google-api-python-client google-auth zeep

      - name: Pasul 1: Executare Descărcare XML
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "🚀 Pornire descărcare XML pentru intervalul: ${{ github.event.inputs.an_start }} - ${{ github.event.inputs.an_end }}"
          python -u Scripts_XML/download_XML.py ${{ github.event.inputs.an_start }} ${{ github.event.inputs.an_end }}

      - name: Pasul 2: Executare Construire / Actualizare Index
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ "${{ github.event.inputs.full_index }}" == "true" ] || [ "${{ inputs.full_index }}" == "true" ]; then
            echo "🚀 [Strategie YML] Se execută FULL INDEX (Se trimite parametrul --full)..."
            python -u Scripts_XML/build_index.py --full
          else
            echo "⚡ [Strategie YML] Se execută INCREMENTAL INDEX..."
            python -u Scripts_XML/build_index.py
          fi
