name: Doar Indexare XML (Build / Incremental Index)

on:
  schedule:
    # Rulează automat din oră în oră (la minutul 0)
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      full_index:
        type: boolean
        description: 'Forțează Reindexare Completă RAW (FULL INDEX)'
        default: false

jobs:
  build-index-only:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod din repozitoriu
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalare dependențe
        run: |
          pip install google-api-python-client google-auth suds-py3

      - name: Executare Construire / Actualizare Index
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          XML_STORAGE_INDEX: ${{ secrets.XML_STORAGE_INDEX }}
          IS_FULL_INPUT: ${{ github.event.inputs.full_index }}
        run: |
          VAL_LOWER=$(echo "${IS_FULL_INPUT}" | tr '[:upper:]' '[:lower:]')
          HOUR_UTC=$(date -u +%H)
          
          # La ora 05:00 UTC (ora 8:00 RO) sau dacă e bifat manual, face FULL RE-INDEX
          if [ "${VAL_LOWER}" = "true" ] || [ "${HOUR_UTC}" = "05" ]; then
            echo "🚀 [Strategie YML] Se execută FULL RE-INDEX COMPLET (build_index.py)..."
            python -u Scripts_XML/build_index.py
          else
            echo "⚡ [Strategie YML] Se execută INCREMENTAL INDEX & IGIENIZARE (update_incremental_index.py)..."
            python -u Scripts_XML/update_incremental_index.py
          fi
