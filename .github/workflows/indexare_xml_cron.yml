name: Doar Indexare XML (Build / Incremental Index)

on:
  schedule:
    # 1. Rulează din 2 în 2 ore (la minutul 0)
    - cron: '0 */2 * * *'
    # 2. Rulează zilnic la ora 07:00 Dimineața (05:00 UTC = 08:00 EEST / 07:00 EEST iarna - aprox. 07:00-08:00 ora României)
    - cron: '0 5 * * *'

  workflow_dispatch:
    inputs:
      full_index:
        type: boolean
        description: 'Forțează Reindexare Completă RAW (FULL INDEX - Scanare fizică 200k+ fișiere)'
        default: false

jobs:
  build-index-only:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod din repozitoriu
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 google-api-python-client google-auth

      - name: Executare Construire / Actualizare Index
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          XML_STORAGE_INDEX: ${{ secrets.XML_STORAGE_INDEX }}
          IS_FULL_INPUT: ${{ github.event.inputs.full_index }}
        run: |
          VAL_LOWER=$(echo "${IS_FULL_INPUT}" | tr '[:upper:]' '[:lower:]')
          
          # Verificăm dacă declanșarea automată (cron) corespunde orei 05:00 UTC (ora 07:00/08:00 RO)
          HOUR_UTC=$(date -u +%H)
          
          if [ "${VAL_LOWER}" = "true" ] || [ "${HOUR_UTC}" = "05" ]; then
            echo "🚀 [Strategie YML] Se execută FULL RE-INDEX COMPLET (build_index.py)..."
            python -u Scripts_XML/build_index.py
          else
            echo "⚡ [Strategie YML] Se execută INCREMENTAL INDEX & IGIENIZARE (update_incremental_index.py)..."
            python -u Scripts_XML/update_incremental_index.py
          fi
