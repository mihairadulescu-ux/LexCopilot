name: "🔄 A.Resetare Manuală XML Tags"

on:
  workflow_dispatch:

jobs:
  reset_tags:
    name: "🔄 Curățare Criterii și Marcaje XML"
    runs-on: ubuntu-latest
    
    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Executare Reset XML Tags (Scanare Totală)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u Scripts_XML/reset_XML_tags.py
2. Scriptul complet actualizat: Scripts_XML/reset_XML_tags.py
Înlocuiește tot conținutul din scriptul curent de reset cu această versiune care include logica nativă multi-drive, bypass la erorile 404 de folder și afișare de contor din 100 în 100 de fișiere procesate.

Python
import os
import json
import time
from google.oauth2.service_account import Credentials
from googleapiclient.discovery import build

VERDE = "\033[92m"
GALBEN = "\033[93m"
ROSU = "\033[91m"
RESET = "\033[0m"

TARGET_FOLDERS_RAW = os.getenv("DRIVE_FOLDER_XML", "")

def obtine_drive():
    print("🔑 [Reset XML] Conectare Google Drive...")
    if "GOOGLE_SERVICE_ACCOUNT_JSON" not in os.environ:
        raise EnvironmentError("❌ Lipsește secretul GOOGLE_SERVICE_ACCOUNT_JSON!")
    info = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])
    creds = Credentials.from_service_account_info(info, scopes=["https://www.googleapis.com/auth/drive"])
    return build("drive", "v3", credentials=creds, cache_discovery=False)

def reseteaza_atribute_xml():
    if not TARGET_FOLDERS_RAW:
        print(f"{ROSU}🛑 Eroare configurare: DRIVE_FOLDER_XML lipseste din mediu!{RESET}")
        return

    folder_ids = [fid.strip() for fid in TARGET_FOLDERS_RAW.split(",") if fid.strip()]
    service = obtine_drive()
    print(f"{VERDE}📂 Inițiere resetare forțată pe {len(folder_ids)} Shared Drive-uri mapate...{RESET}")

    fisiere_marcate = []
    
    # Pasul 1: Scanare robustă cu ambele metode combinate
    for folder_id in folder_ids:
        print(f"🔍 Scanare profundă pe Drive ID: {folder_id}...")
        page_token = None
        query = f"'{folder_id}' in parents and trashed = false"
        
        while True:
            try:
                response = service.files().list(
                    q=query, 
                    spaces='drive',
                    fields="nextPageToken, files(id, name, description)", 
                    pageToken=page_token, 
                    pageSize=1000,
                    supportsAllDrives=True, 
                    includeItemsFromAllDrives=True
                ).execute()
                
                fișiere = response.get("files", [])
                for f in fișiere:
                    nume = f.get('name', '').lower()
                    descriere = f.get('description', '')
                    if nume.endswith('.xml') and descriere == "processed_for_tags: true":
                        fisiere_marcate.append(f)
                        
                page_token = response.get("nextPageToken", None)
                if not page_token:
                    break
            except Exception:
                # Metoda B: Căutare directă imuna la ierarhia rădăcină a Drive-ului
                try:
                    query_alt = "name contains '.xml' and trashed = false"
                    response_alt = service.files().list(
                        q=query_alt,
                        spaces='drive',
                        fields="nextPageToken, files(id, name, description)",
                        pageToken=page_token,
                        pageSize=1000,
                        supportsAllDrives=True,
                        includeItemsFromAllDrives=True
                    ).execute()
                    
                    for f in response_alt.get("files", []):
                        if f.get("description") == "processed_for_tags: true":
                            fisiere_marcate.append(f)
                    break
                except Exception as e_alt:
                    print(f"{ROSU}⚠️ Scanarea a eșuat complet pe acest drive: {e_alt}{RESET}")
                    break

    if not fisiere_marcate:
        print(f"{VERDE}✨ Nu s-a găsit niciun XML marcat în metadate. Totul este curat și gata de procesat!{RESET}")
        return

    total_fisiere = len(fisiere_marcate)
    print(f"{GALBEN}⚙️ Am detectat {total_fisiere} fișiere marcate. Începe ștergerea etichetelor...{RESET}")
    
    # Pasul 2: Curățarea efectivă cu afișare de progres în timp real
    for idx, xml in enumerate(fisiere_marcate, 1):
        try:
            service.files().update(
                fileId=xml["id"], 
                body={"description": ""}, 
                supportsAllDrives=True
            ).execute()
            
            # Afișare progres din 100 în 100
            if idx % 100 == 0 or idx == total_fisiere:
                print(f"    ↳ {VERDE}✓ [{idx}/{total_fisiere}]{RESET} Resetat description pentru: {xml['name']}")
                
        except Exception as e:
            print(f"{ROSU}⚠️ Eroare resetare fișier {xml['name']}: {e}{RESET}")
            time.sleep(1) # Mic buffer la eroare de rețea
            continue

    print(f"\n{VERDE}🚀 Resetare completă! Toate cele {total_fisiere} XML-uri sunt acum declarate UNPROCESSED.{RESET}")

if __name__ == "__main__":
    reseteaza_atribute_xml()
