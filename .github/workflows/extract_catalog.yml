name: "Extracție Catalog Master Metadate"

on:
  workflow_dispatch: # Pornire manuală din interfața GitHub Actions

jobs:
  extract:
    name: "Extragere XML în CSV Master"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod din repository
        uses: actions/checkout@v4

      - name: Configurare Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependente
        run: |
          python -m pip install --upgrade pip
          pip install lxml google-api-python-client google-auth

      - name: Rulează Extracția Catalogului
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML }}
          METADATA_FOLDER_ID: ${{ secrets.METADATA_FOLDER_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u extract_raw_catalog.py
