# Filename: .github/workflows/rebuild_XML_master_index.yml
# Scop: Reconstrucție și sincronizare periodică Master Index

name: Rebuild Master Index

on:
  workflow_dispatch:
    inputs:
      full_reset:
        type: boolean
        description: 'FULL RESET: Golire MasterIndex + Re-scanare arhive .tar.gz + Micro-Indecsi'
        default: false

  schedule:
    # Rulează automat din oră în oră (la minutul 0: 00:00, 01:00, 02:00, ..., 23:00 UTC)
    - cron: '0 22 * * *'
    - cron: '0 04 * * *'
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'

jobs:
  rebuild-master:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalare dependente
        run: pip install google-api-python-client google-auth

      - name: Reconstructie Master Index (RESET)
        if: ${{ inputs.full_reset == true }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML || secrets.DRIVE_FOLDER_XML }}
          XML_STORAGE_INDEX: ${{ vars.XML_STORAGE_INDEX || secrets.XML_STORAGE_INDEX }}
          FOLDER_INDEX_ID: ${{ vars.XML_STORAGE_INDEX || secrets.XML_STORAGE_INDEX }}
        run: python Scripts_XML/rebuild_master_index.py reset

      - name: Reconstructie Master Index (UPDATE SIMPLU)
        # Se execută dacă full_reset e false SAU dacă jobul e declanșat de Schedule/Cron (când inputs.full_reset este null)
        if: ${{ inputs.full_reset != true }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML || secrets.DRIVE_FOLDER_XML }}
          XML_STORAGE_INDEX: ${{ vars.XML_STORAGE_INDEX || secrets.XML_STORAGE_INDEX }}
          FOLDER_INDEX_ID: ${{ vars.XML_STORAGE_INDEX || secrets.XML_STORAGE_INDEX }}
        run: python Scripts_XML/rebuild_master_index.py
