name: Extract XML Dictionaries

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Anul de început (ex: 2000)'
        required: true
        default: '2020'
      end_year:
        description: 'Anul de sfârșit (ex: 2024)'
        required: true
        default: '2024'

jobs:
  extract-dictionaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Dictionary Extractor
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
          XML_STORAGE_INDEX: ${{ secrets.XML_STORAGE_INDEX || vars.XML_STORAGE_INDEX }}
          METADATA_FOLDER_ID: ${{ secrets.METADATA_FOLDER_ID || vars.METADATA_FOLDER_ID }}
        run: |
          python -u Scripts_XML/download_XML_dictionaries.py ${{ inputs.start_year }} ${{ inputs.end_year }}
