name: Build Index & Cleanup Monitoare Oficiale

on:
  schedule:
    # Rulează în fiecare zi la ora 05:00 UTC (adica 08:00 AM ora României)
    - cron: '0 5 * * *'
  workflow_dispatch: # Permite și pornirea manuală din interfața GitHub

jobs:
  build-index-mo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Execuție Full Re-Index și Curățare Duplicate MO
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python Scripts_PDF/build_index_mo.py
