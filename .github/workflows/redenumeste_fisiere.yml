name: Utilitar - Redenumire Standard Fișiere XML

on:
  workflow_dispatch:
    inputs:
      confirmare:
        description: 'Tastează "DA" pentru a confirma pornirea redenumirii pe Google Drive'
        required: true
        default: 'DA'

jobs:
  redenumeste-fisiere-xml:
    name: Corectare & Redenumire Nume Fișiere XML pe Drive
    runs-on: ubuntu-latest

    # ==========================================================================
    # VARIABILE GLOBALE DE MEDIU (Conexiune la Google Drive API)
    # ==========================================================================
    env:
      DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout cod din repozitoriu
        uses: actions/checkout@v4

      - name: Configurare mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalare dependențe Python
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Execuție Script Redenumire
        run: |
          echo "🚀 Se verifică confirmarea..."
          if [ "${{ github.event.inputs.confirmare }}" != "DA" ]; then
            echo "🛑 Execuție anulată! Nu s-a introdus 'DA' ca confirmare."
            exit 1
          fi

          echo "🚀 Execuție script redenumire_fisiere_drive.py..."
          python Scripts_XML/redenumeste_fisiere_drive.py
