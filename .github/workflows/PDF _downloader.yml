# Filename:.github/workflows/PDF _downloader.yml
# Scop

name: Descarcare Monitoare Oficiale in format PDF
on:
  workflow_dispatch:
    inputs:
      ruleaza_reset:
        description: "Curatare totala si reconstructie registru CSV (True/False)"
        required: false
        type: boolean
        default: false

jobs:
  procesare_an:
    name: Sincronizare An ${{ matrix.an }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        an: [2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth httpx

      - name: Executare Reset si Download Ierarhic
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          AN_TINTA: ${{ matrix.an }}
          STRATEGIE_RESET: ${{ github.event.inputs.ruleaza_reset }}
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          if [ "$STRATEGIE_RESET" = "true" ]; then
            echo "🔄 Pornire inventar și resetare registru pentru anul $AN_TINTA..."
            python -u Scripts_PDF/inventar_si_reset.py $AN_TINTA
          else
            echo "▶️ Se sare peste reset. Se folosește registrul existent."
          fi
          
          python -u Scripts_PDF/download_PDF.py $AN_TINTA
