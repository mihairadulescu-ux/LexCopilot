name: Optimizare si Procesare XML Istoric

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
    - name: Checkout cod
      uses: actions/checkout@v4

    - name: Configurare Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        # Am scos linia de cache pentru a evita eroarea de fișier lipsă

    - name: Instalare dependinte Google API
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-api-python-client

    - name: Rulează procesorul XML
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python optimize_xml_processor.py
