name: Descărcare XML Just.ro

on:
  workflow_dispatch:
    inputs:
      an_specific:
        description: 'Anul specific de descărcat (Lăsați gol pentru a rula pe TOATĂ matricea)'
        required: false
        default: ''

  schedule:
    - cron: '0 */6 * * *'

jobs:
  download-xml-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        an_grup: ["1990-1999", "2000-2009", "2010-2015", "2016-2020", "2021-2026"]

    steps:
      - name: Checkout Cod
        uses: actions/checkout@v4

      - name: Configurare Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalare Dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth zeep

      - name: Execuție Script Descărcare XML
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
          SOAP_SEARCH_ENDPOINT: ${{ secrets.SOAP_SEARCH_ENDPOINT || vars.SOAP_SEARCH_ENDPOINT }}
          AN_SPECIFIC_INPUT: ${{ inputs.an_specific }}
          AN_GRUP_MATRIX: ${{ matrix.an_grup }}
          PYTHONUNBUFFERED: "1"
        run: |
          IF_AN="${AN_SPECIFIC_INPUT:-$AN_GRUP_MATRIX}"
          echo "⏬ [Strategie YML] Pornire descărcare fișiere XML pentru intervalul/anul: $IF_AN"
          python -u Scripts_XML/download_XML.py --interval "$IF_AN"
