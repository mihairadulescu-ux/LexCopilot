name: Descarcare si Arhivare XML

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Rulează la fiecare 6 ore

jobs:
  download-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Cod
        uses: actions/checkout@v4

      - name: Configurare Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalare Dependente
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth zeep

      - name: Rulare Pipeline XML & Archiver
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          FOLDERE_XML_RAW: ${{ vars.FOLDERE_XML_RAW }}
          SOAP_SEARCH_ENDPOINT: ${{ vars.SOAP_SEARCH_ENDPOINT }}
        run: |
          python Scripts_XML/download_xml.py
