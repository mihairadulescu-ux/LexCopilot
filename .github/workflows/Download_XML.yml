name: Descărcare XML Just.ro

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Rulează la fiecare 6 ore

jobs:
  download-xml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Cod
        uses: actions/checkout@v4

      - name: Configurare Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalare Dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth zeep

      - name: Execuție Script Descărcare XML
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML || vars.DRIVE_FOLDER_XML }}
          SOAP_SEARCH_ENDPOINT: ${{ secrets.SOAP_SEARCH_ENDPOINT || vars.SOAP_SEARCH_ENDPOINT }}
        run: |
          echo "⏬ [Strategie YML] Pornire descărcare fișiere XML..."
          python Scripts_XML/download_xml.py
