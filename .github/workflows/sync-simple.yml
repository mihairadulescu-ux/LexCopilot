name: "1. Descărcare PDF-uri Simple (Matrice)"
on:
  workflow_dispatch: # Îți permite să pornești manual descărcarea din interfața GitHub Actions

jobs:
  sincronizare_matrice:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # <--- CRITIC: Dacă un runner pică, ceilalți ani continuă independenți!
      matrix:
        # Lista completă a tuturor anilor care vor rula în paralel
        an: [1990, 1991, 1992, 1993, 1994, 1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalare librării necesare
        run: |
          pip install httpx google-auth google-auth-httplib2 google-api-python-client

      - name: Executare Script Sincronizare PDF
        # AICI este rezolvarea erorii de mediu: maparea se face la nivelul pasului care rulează codul
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_PDF: ${{ secrets.DRIVE_FOLDER_PDF }}
          METADATA_FOLDER_ID: ${{ secrets.METADATA_FOLDER_ID }}
          # Legăm variabila citită de Python (AN_CURENT) direct de elementul activ din matrice (matrix.an)
          AN_CURENT: ${{ matrix.an }}
        run: |
          python -u sync_simple.py
