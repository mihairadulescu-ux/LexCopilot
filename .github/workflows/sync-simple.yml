name: "[MO] Rulare Matrice Anuala"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  sincronizare-monitoare:
    name: "Procesare Liste de Ani"
    runs-on: ubuntu-latest

    steps:
      - name: Descarcare cod
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependente
        run: |
          python -m pip install --upgrade pip
          pip install httpx google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Executare Script Universal
        run: |
          python scripts/mo/mo_download_universal.py
        env:
          AN_CURENT: "2018,2019,2024,2026"
          DRIVE_FOLDER_PDF: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
