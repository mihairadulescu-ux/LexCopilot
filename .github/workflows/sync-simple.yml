name: "1. [MO] Rulare Matrice Anuala"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  sincronizare-monitoare:
    name: "Procesare Liste de Ani"
    runs-on: ubuntu-latest

    steps:
      - name: Descarcare cod
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependente
        run: |
          python -m pip install --upgrade pip
          pip install httpx google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Executare Script Universal
        run: |
          # Adaugam flag-ul "-u" (unbuffered) ca sa vedem print-urile instant pe ecran
          python -u sync_simple.py
        env:
          AN_CURENT: "2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018,2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026"
          DRIVE_FOLDER_PDF: ${{ vars.DRIVE_FOLDER_PDF }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
