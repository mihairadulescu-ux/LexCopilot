name: "🏁 Actualizare Dictionare XML - Emitenti si Tip Acte"

on:
  workflow_dispatch:
    inputs:
      forteaza_resetare:
        description: "Forțează resetarea tag-urilor din Cloud înainte de colectare (True/False)"
        required: false
        type: boolean
        default: false

jobs:
  ruleaza_dictionare:
    name: Extragere Nomenclatoare XML
    runs-on: ubuntu-latest

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v5

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth httpx

      - name: Executare Reset si Colectare Dictionare
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}
          FORTEAZA_RESET: ${{ github.event.inputs.forteaza_resetare }}
          PYTHONUNBUFFERED: "1"
        run: |
          # Pasul 1: Dacă bifa este TRUE, executăm scriptul de resetare a proprietăților din Google Drive
          if [ "$FORTEAZA_RESET" = "true" ]; then
            echo "🔄 [BIFAT] Pornire script curățare și resetare etichete Cloud..."
            python -u Scripts_XML/reset_XML_tags.py
          else
            echo "▶️ [IGNORAT] Se sare peste resetare. Se procesează doar fișierele complet noi."
          fi
          
          # Pasul 2: Rularea automată a scriptului de colectare (pentru nomenclatoare)
          echo "🚀 Pornire analiză ierarhică XML și extragere termeni unici..."
          python -u Scripts_XML/download_XML_dictionaries.py
