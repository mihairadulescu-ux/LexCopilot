name: Actualizare Dictionare XML - Emitenti si Tip Acte

on:
  workflow_dispatch:
    inputs:
      forteaza_resetare:
        description: "Forțează procesarea tuturor fișierelor (True/False)"
        required: false
        type: boolean
        default: false

jobs:
  ruleaza_dictionare:
    name: Extragere Nomenclatoare XML
    runs-on: ubuntu-latest

    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v5

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth httpx

      - name: Executare download_XML_dictionaries.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}
          FORTEAZA_RESET: ${{ github.event.inputs.forteaza_resetare }}
          PYTHONUNBUFFERED: "1"
        run: |
          # Dacă pe viitor vrei să adaugi un script de resetare totală a flag-urilor din Drive, 
          # poți activa logica de mai jos. Momentan rulăm direct dicționarele stabil.
          if [ "$FORTEAZA_RESET" = "true" ]; then
            echo "🔄 S-a solicitat forțarea procesării..."
          fi
          
          echo "🚀 Pornire analiză ierarhică XML-uri noi..."
          python -u Scripts_XML/download_XML_dictionaries.py
