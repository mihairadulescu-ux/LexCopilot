name: "📊 Descărcare Nomenclatoare XML Tags"

on:
  workflow_dispatch:
    inputs:
      ruleaza_reset:
        description: "🔄 Bifează aici dacă vrei să RESETEZI toate tagurile înainte de scanare"
        required: false
        type: boolean
        default: false

jobs:
  download_tags:
    name: "📊 Extragere Emitenți & Tip Acte"
    runs-on: ubuntu-latest
    
    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install lxml google-api-python-client google-auth requests

      - name: Pasul 1 - Reset XML Tags (Rulează DOAR dacă ai bifat căsuța)
        if: ${{ github.event.inputs.ruleaza_reset == 'true' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u Scripts_XML/reset_XML_tags.py

      - name: Pasul 2 - Executare scanare și agregare Tags (Unprocessed)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}       
          METADATA_FOLDER_ID: ${{ vars.METADATA_FOLDER_ID }}   
          PYTHONUNBUFFERED: "1"
        run: |
          python -u Scripts_XML/download_XML_dictionaries.py
