name: Creare dictionare

on:
  workflow_dispatch:
    inputs:
      ruleaza_reset:
        description: 'Bifați aici dacă vreți RESETAREA flagurilor (processed -> false) înainte de rulare'
        required: false
        type: boolean
        default: false

jobs:
  procesare_paralela:
    runs-on: ubuntu-latest
    
    # Secretele sunt injectate global la nivel de job pentru vizibilitate maximă în pași
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      DRIVE_FOLDER_XML: ${{ secrets.DRIVE_FOLDER_XML }}

    strategy:
      fail-fast: false # Nu oprește celelalte fire dacă un an are probleme izolate
      matrix:
        ani: [
          "1990 1991", "1992 1993", "1994 1995", "1996 1997", "1998 1999",
          "2000 2001", "2002 2003", "2004 2005", "2006 2007", "2008 2009",
          "2010 2011", "2012 2013", "2014 2015", "2016 2017", "2018 2019",
          "2020 2021", "2022 2023", "2024 2025","2026"
        ]

    steps:
      - name: Verificare Cod Sursa
        uses: actions/checkout@v4

      - name: Configurare Mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalare Dependinte Industriale
        run: |
          python -m pip install --upgrade pip
          pip install lxml google-auth google-api-python-client zeep

      # ======================================================================
      # PASUL 1: RESETARE FLAGURI OPTIONALA (Rulează doar dacă bifezi manual)
      # ======================================================================
      - name: ⚙️ Rulare Reset XML Tags (Matrice)
        if: ${{ github.event.inputs.ruleaza_reset == 'true' }}
        continue-on-error: true
        run: |
          if [ -f Scripts_XML/reset_XML_tags.py ]; then
            python Scripts_XML/reset_XML_tags.py ${{ matrix.ani }}
          else
            echo "⚠️ Scriptul reset_XML_tags.py nu a fost gasit in folderul Scripts_XML!"
          fi

      # ======================================================================
      # PASUL 2: EXTRAGERE DICTIONARE (Citire directă text din Google Drive)
      # ======================================================================
      - name: 🔍 Rulare Extragere Dictionare (Matrice)
        continue-on-error: true
        run: |
          if [ -f Scripts_XML/download_dictionaries.py ]; then
            python Scripts_XML/download_dictionaries.py ${{ matrix.ani }}
          elif [ -f Scripts_XML/get_XML_tags.py ]; then
            python Scripts_XML/get_XML_tags.py ${{ matrix.ani }}
          else
            echo "⚠️ Scriptul de extragere dictionare nu a fost gasit in folderul Scripts_XML!"
          fi

      # ======================================================================
      # PASUL 3: SALVARE FRAGMENTE PER FIR
      # ======================================================================
      - name: 📦 Salvare Nomenclatoare Partiale ca Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomenclatoare-${{ matrix.ani }}
          path: lista_*.csv
          retention-days: 1

  consolidare_dictionare:
    needs: procesare_paralela
    runs-on: ubuntu-latest
    steps:
      - name: Verificare Cod Sursa
        uses: actions/checkout@v4

      - name: 📥 Descarcare Toate Nomenclatoarele Partiale
        uses: actions/download-artifact@v4
        with:
          pattern: nomenclatoare-*
          merge-multiple: true

      # Script inline care adună bucățile de la cele 18 fire și elimină duplicatele
      - name: 🛠️ Consolidare si Eliminare Duplicate Nomenclator Global
        run: |
          python -c "
          import glob, csv, os
          
          def unifica(prefix, header_nume, fisier_iesire):
              total_set = set()
              fisiere = glob.glob(f'{prefix}_*.csv')
              print(f'Gasite {len(fisiere)} fragmente pentru {prefix}')
              for f in fisiere:
                  try:
                      with open(f, mode='r', encoding='utf-8') as fh:
                          reader = csv.reader(fh)
                          next(reader, None) # Sarim peste header
                          for rand in reader:
                              if rand and rand[0].strip():
                                  total_set.add(rand[0].strip())
                  except Exception as e:
                      print(f'Eroare citire {f}: {e}')
              
              with open(fisier_iesire, mode='w', newline='', encoding='utf-8') as fh:
                  writer = csv.writer(fh)
                  writer.writerow([header_nume])
                  for item in sorted(list(total_set)):
                      writer.writerow([item])
              print(f'✅ Salvat nomenclator unic: {fisier_iesire} ({len(total_set)} elemente distincte)')

          unifica('lista_emitenti', 'Emitent', 'nomenclator_global_emitenti.csv')
          unifica('lista_tip_acte', 'Tip_Act', 'nomenclator_global_tip_acte.csv')
          "

      # Rezultatul final, curățat și gata de descărcat din interfața GitHub
      - name: 🏆 Publicare Nomenclatoare Globale Finale
        uses: actions/upload-artifact@v4
        with:
          name: Nomenclatoare_Globale_Finale
          path: nomenclator_global_*.csv
          retention-days: 14
