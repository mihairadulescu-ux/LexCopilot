name: "📊 Descărcare Nomenclatoare XML Tags"

on:
  workflow_dispatch: # Îl pornești manual din interfața GitHub Actions când vrei să scanezi etichetele noi

jobs:
  download_tags:
    name: "📊 Extragere Emitenți & Tip Acte din XML"
    runs-on: ubuntu-latest
    
    steps:
      - name: Descărcare cod din repository
        uses: actions/checkout@v4

      - name: Configurare mediu Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install lxml google-api-python-client google-auth requests

      - name: Executare scanare și agregare Tags
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_XML: ${{ vars.DRIVE_FOLDER_XML }}       # Folderul sursă cu XML-urile brute
          METADATA_FOLDER_ID: ${{ vars.METADATA_FOLDER_ID }}   # Folderul destinație pentru CSV-uri
          PYTHONUNBUFFERED: "1"
        run: |
          python -u Scripts_XML/reset_XML_tags.py
