name: Reset Google Drive Processed Status

on:
  workflow_dispatch: # Permite pornirea manuală din tab-ul "Actions" din GitHub

jobs:
  reset-drive-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Am lăsat 3.13, versiunea stabilă detectată de runner-ul tău

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Reset Script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python reset_processed_status.py
