name: "Descărcare Legislație Paralelă"

on:
  workflow_dispatch: # Pornire manuală din GitHub Actions
  schedule:
    - cron: '0 1 * * *' # Rulează automat în fiecare noapte la ora 01:00 AM UTC

jobs:
  download:
    name: "Segment: ${{ matrix.nume }}"
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false # Dacă un segment dă eroare, celelalte continuă să ruleze!
      matrix:
        include:
          - nume: "2000-2004"
            start: 2000
            end: 2004
          - nume: "2005 - 2006"
            start: 2005
            end: 2009
          - nume: "2010 - 2014"
            start: 2010
            end: 2014
          - nume: "2015 - 20019"
            start: 2015
            end: 2019
          - nume: "2020 - 2023"
            start: 2020
            end: 2023
          - nume: "2024 - 2026"
            start: 2024
            end: 2026

    steps:
      - name: Checkout cod din repository
        uses: actions/checkout@v4

      - name: Configurare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalare dependente
        run: |
          python -m pip install --upgrade pip
          pip install lxml zeep google-api-python-client google-auth requests

      - name: Rulează Descărcarea
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          START_YEAR: ${{ matrix.start }}
          END_YEAR: ${{ matrix.end }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u main_all.py
