name: Descarcare XML de pe legislatie.just.ro
on:
  workflow_dispatch: # Permite declanșarea manuală a crawler-ului din interfața GitHub
  schedule:
    - cron: '0 2 * * 1' # Opțional: rulează automat în fiecare luni la ora 02:00 AM

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout cod din repository
      uses: actions/checkout@v4

    - name: Configureaza mediul Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip' # Optimizează timpul de rulare salvând cache-ul librăriilor

    - name: Instaleaza dependentele in runner
      run: |
        python -m pip install --upgrade pip
        pip install suds-py3 google-api-python-client google-auth requests

    - name: Ruleaza Scriptul de Descarcare Legislatie
      env:
        # Mapăm secretul tău de pe GitHub direct în variabila pe care o caută scriptul Python
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: |
        python main_all.py
