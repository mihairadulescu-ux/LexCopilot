name: Descarcare XML de pe legislatie.just.ro

on:
  schedule:
    # Rulează în fiecare seară la ora 22:00 (ora României, adică 19:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch:
    # Ne permite să pornim robotul și manual, dintr-un buton

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descarcă codul din repository
      uses: actions/checkout@v4

    - name: 2. Instalează Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: 3. Instalează dependențele electronice
      run: |
        python -m pip install --upgrade pip
        pip install lxml google-oauth2-tool google-auth-oauthlib google-api-python-client zeep httplib2

    - name: 4. Pornește Motorul de Colectare
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        PYTHONUNBUFFERED: "1"

     - name: Instalează dependențele necesare
  run: |
    pip install suds-py3 google-api-python-client google-auth   
      run: python main_all.py
